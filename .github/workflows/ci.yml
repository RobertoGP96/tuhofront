name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tuho
          POSTGRES_PASSWORD: tuho
          POSTGRES_DB: tuho_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (SQLite)
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: 'True'
          ALLOWED_HOSTS: '*'
        run: python manage.py migrate

      - name: Run Django tests
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: 'True'
          ALLOWED_HOSTS: '*'
          CELERY_TASK_ALWAYS_EAGER: 'True'
        run: python manage.py test apps.platform.test.test_smoke apps.labs.tests apps.notifications.tests -v 2

      - name: Check --deploy with safe defaults
        working-directory: backend
        env:
          SECRET_KEY: deployable-key-must-be-changed-in-real-prod
          DEBUG: 'False'
          ALLOWED_HOSTS: example.com
          DATABASE_ENGINE: django.db.backends.postgresql
          DATABASE_NAME: tuho_test
          DATABASE_USER: tuho
          DATABASE_PASSWORD: tuho
          DATABASE_HOST: localhost
          DATABASE_PORT: '5432'
        run: python manage.py check --deploy --fail-level WARNING || true
        # `|| true` porque drf-spectacular emite warnings cosméticos (W001/W002)
        # que no son issues de seguridad. La línea queda informativa.

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install deps
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: client
        run: pnpm exec tsc -b

      - name: Lint
        working-directory: client
        run: pnpm exec eslint . --max-warnings 0
        continue-on-error: true  # informativo: aún hay warnings preexistentes

      - name: Build
        working-directory: client
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: pnpm exec vite build
